# JointTrajectoryController closes PD on measured state and writes torque (effort).
# Hardware (FeixiMujocoHardware) applies ctrl = effort with clipping only.
feixi_trajectory_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
      - joint7
      - gripper_finger_joint
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
    gains:
      joint1:
        p: 1200.0
        d: 90.0
      joint2:
        p: 1200.0
        d: 90.0
      joint3:
        p: 1200.0
        d: 90.0
      joint4:
        p: 1200.0
        d: 90.0
      joint5:
        p: 1200.0
        d: 90.0
      joint6:
        p: 1200.0
        d: 90.0
      joint7:
        p: 1200.0
        d: 90.0
      gripper_finger_joint:
        p: 380.0
        d: 20.0
